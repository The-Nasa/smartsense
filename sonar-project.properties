# Archivo de configuración para SonarCloud / SonarQube
# Complete estos datos con su organización y llave de proyecto de SonarCloud

sonar.organization=the-nasa
sonar.projectKey=The-Nasa_smartsense
sonar.projectName=smartsense
sonar.host.url=https://sonarcloud.io

# Directorio que contiene el código fuente
sonar.sources=src

# Exclusiones de archivos para no analizar dependencias o compilaciones
sonar.exclusions=node_modules/**,dist/**,build/**,vite.config.ts,tailwind.config.js

# Configuración para reporte de pruebas unitarias (si se implementan en el futuro)
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Codificación de caracteres
sonar.sourceEncoding=UTF-8
